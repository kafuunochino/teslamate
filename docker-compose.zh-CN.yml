services:
  teslamate:
    build:
      context: .
      args:
        TESLAMATE_REVISION: ${TESLAMATE_REVISION:-}
    restart: always
    environment:
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?请在 .env 中设置 ENCRYPTION_KEY}
      DATABASE_USER: teslamate
      DATABASE_PASS: ${DATABASE_PASS:?请在 .env 中设置 DATABASE_PASS}
      DATABASE_NAME: teslamate
      DATABASE_HOST: database
      MQTT_HOST: mosquitto
      DEFAULT_LOCALE: zh_Hans
      TZ: ${TZ:-Asia/Shanghai}
      # 程序会根据令牌区域自动选择中国区服务；仅在排查特殊网络问题时覆盖：
      # TESLA_API_HOST: https://owner-api.vn.cloud.tesla.cn
      # TESLA_WSS_HOST: wss://streaming.vn.cloud.tesla.cn
    ports:
      - "4000:4000"
    volumes:
      - ./import:/opt/app/import
    cap_drop:
      - all
    depends_on:
      - database
      - mosquitto

  database:
    image: postgres:18-trixie
    restart: always
    environment:
      POSTGRES_USER: teslamate
      POSTGRES_PASSWORD: ${DATABASE_PASS:?请在 .env 中设置 DATABASE_PASS}
      POSTGRES_DB: teslamate
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - teslamate-db:/var/lib/postgresql

  grafana:
    # Only exposed inside the docker network. TeslaMate (port 4000) is the only
    # entry point and reverse-proxies /dashboards/* here after the user is signed
    # in (see lib/teslamate_web/plugs/grafana_proxy.ex).
    build:
      context: ./grafana
    restart: always
    expose:
      - "3000"
    environment:
      DATABASE_USER: teslamate
      DATABASE_PASS: ${DATABASE_PASS:?请在 .env 中设置 DATABASE_PASS}
      DATABASE_NAME: teslamate
      DATABASE_HOST: database
      DATABASE_PORT: 5432
      DATABASE_SSL_MODE: disable
      GF_USERS_DEFAULT_LANGUAGE: zh-Hans
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL:-http://localhost:4000/dashboards}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - teslamate-grafana-data:/var/lib/grafana
    depends_on:
      - database

  mosquitto:
    image: eclipse-mosquitto:2
    restart: always
    command: mosquitto -c /mosquitto-no-auth.conf
    volumes:
      - mosquitto-conf:/mosquitto/config
      - mosquitto-data:/mosquitto/data

volumes:
  teslamate-db:
  teslamate-grafana-data:
  mosquitto-conf:
  mosquitto-data:
