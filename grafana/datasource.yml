apiVersion: 1

datasources:
  - name: TeslaMate
    # `uid: TeslaMate` is required because every dashboard in
    # `grafana/dashboards/**/*.json` references the datasource by uid
    # (it is what Grafana persists once a dashboard is saved). Without the
    # explicit uid, dashboards would fail to find the datasource and show
    # "No data" even though the datasource itself is healthy. See #4576.
    uid: TeslaMate
    type: postgres
    url: $DATABASE_HOST:$DATABASE_PORT
    user: $DATABASE_USER
    access: proxy
    basicAuth: false
    withCredentials: false
    isDefault: true
    secureJsonData:
      password: $DATABASE_PASS
    jsonData:
      postgresVersion: 1500
      sslmode: $DATABASE_SSL_MODE
      database: $DATABASE_NAME
    version: 1
    editable: true
